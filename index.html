<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王思源 | 数字资产看板</title>
    <!-- 引入外部样式（保留原本的样式底子） -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ==========================================
           🎨 物理全盘修复：核心暗黑毛玻璃大卡片样式
           ========================================== */
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a; /* 暗黑背景 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-card {
            background: rgba(25, 25, 25, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        .card-title {
            color: #ffffff;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .asset-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            transition: all 0.3s ease;
        }

        .asset-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(0, 242, 254, 0.3);
            transform: translateY(-2px);
        }

        .asset-icon {
            font-size: 24px;
            line-height: 1;
        }

        .asset-info h3 {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 6px 0;
        }

        .asset-info p {
            color: #999999;
            font-size: 13px;
            line-height: 1.5;
            margin: 0;
        }

        .divider {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            text-align: center;
            margin: 30px 0 25px 0;
            letter-spacing: 2px;
        }

        /* 表单样式修复 */
        #contactForm .input-group {
            margin-bottom: 16px;
        }

        #contactForm input {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 0;
            color: #ffffff;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        #contactForm input:focus {
            outline: none;
            border-bottom-color: #00f2fe;
        }

        #contactForm input::placeholder {
            color: #555555;
        }

        .submit-btn {
            width: 100%;
            background: transparent;
            border: 1px solid rgba(0, 242, 254, 0.25);
            color: #00f2fe;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            background: rgba(0, 242, 254, 0.08);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* ==========================================
           ✨ 全盘外挂：量子通信流光交互系统弹窗样式
           ========================================== */
        .custom-modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; opacity: 0;
            transition: opacity 0.3s ease; pointer-events: none;
        }
        .custom-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .custom-modal-box {
            position: relative; width: 90%; max-width: 420px; padding: 1.5px;
            border-radius: 16px; overflow: hidden;
            background: conic-gradient(from 0deg, transparent, #00f2fe, transparent, #ff0844, transparent);
            animation: rotateStreamer 4s linear infinite;
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .custom-modal-overlay.active .custom-modal-box { transform: scale(1); }
        .custom-modal-content { background: #141414; padding: 30px; border-radius: 15px; color: #ffffff; text-align: center; }
        .custom-modal-text { font-size: 15px; line-height: 1.6; margin-bottom: 25px; white-space: pre-wrap; color: #e0e0e0; text-align: left; }
        .custom-modal-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe); color: #0d0d0d; font-weight: bold;
            border: none; padding: 10px 32px; border-radius: 20px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3); transition: all 0.2s ease; width: 100%;
        }
        .custom-modal-btn:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5); }
        @keyframes rotateStreamer { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- 卡片主体容器 -->
    <div class="main-container" id="mainCard">
        <div class="modal-card">
            <h2 class="card-title">🎨 我的数字资产展示</h2>
            
            <!-- 1. AI漫剧卡片 -->
            <div class="asset-item">
                <span class="asset-icon">🎬</span>
                <div class="asset-info">
                    <h3>AI 漫剧视听商业化流水线</h3>
                    <p>打通角色特征锁定与 SVD 时序控制，实现 3D 真实感神话级换装连贯产出。核心主打成果：新国风神话大作《十二生肖》！</p>
                </div>
            </div>
            
            <!-- 2. ComfyUI卡片 -->
            <div class="asset-item">
                <span class="asset-icon">🤖</span>
                <div class="asset-info">
                    <h3>ComfyUI 自动化电商部署</h3>
                    <p>基于多路 ControlNet 抠图与换装，锁定服装包包模型，智能融合高质量流光级画面。核心主打成果：高品质虚拟电商模特/包包展示视频/工作流成果！</p>
                </div>
            </div>
            
            <div class="divider">✦ 携手构筑未来资产 ✦</div>
            
            <!-- 意向提交表单 -->
            <form id="contactForm">
                <div class="input-group">
                    <input type="text" placeholder="你的称呼 / 厂牌名称" required>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="联系方式 (Email信道)" required>
                </div>
                <button type="submit" class="submit-btn">发射意向</button>
            </form>
        </div>
    </div>

    <!-- 核心驱动脚本 -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const contactForm = document.getElementById('contactForm');
            if (contactForm) {
                contactForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    
                    const nameInput = contactForm.querySelector('input[type="text"]') || contactForm.querySelectorAll('input')[0];
                    const emailInput = contactForm.querySelector('input[type="email"]') || contactForm.querySelectorAll('input')[1];
                    
                    const name = nameInput ? nameInput.value : '神秘访客';
                    const contact = emailInput ? emailInput.value : '未公开信道';
                    
                    const modalText = `🧙‍♂️ 【量子通信建立成功】\n-------------------------\n🏭 厂牌/称呼: ${name}\n📬 联络信道: ${contact}\n\n🚀 信号已全盘发射，静待频段共鸣！`;
                    
                    const overlay = document.createElement('div');
                    overlay.className = 'custom-modal-overlay';
                    overlay.innerHTML = `
                        <div class="custom-modal-box">
                            <div class="custom-modal-content">
                                <div class="custom-modal-text">${modalText}</div>
                                <button class="custom-modal-btn">注入灵力</button>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(overlay);
                    
                    setTimeout(() => { 
                        overlay.classList.add('active'); 
                    }, 30);
                    
                    overlay.querySelector('.custom-modal-btn').addEventListener('click', () => {
                        overlay.classList.remove('active');
                        setTimeout(() => { 
                            overlay.remove(); 
                        }, 300);
                    });
                    
                    contactForm.reset();
                });
            }
        });
    </script>
</body>
</html>
