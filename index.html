<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王思源 | 视觉架构师</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0d0e12;
            color: #f5f5f7;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: relative;
        }

        /* 🌌 三重路径兼容：强行抓取你的 ComfyUI 渲染图 */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* 保险A：抓取带.png的 / 保险B：抓取不显示后缀的 / 保险C：抓取可能重名叠加的 */
            background-image: url('anime-collage-bg.png'), 
                              url('anime-collage-bg'),
                              url('anime-collage-bg.png.png');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            z-index: 1;
            opacity: 0.65;
        }

       /* 🌌 纯净暗黑面罩：洗掉紫色，还原真实色彩 */
       .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 14, 18, 0.65); /* 🌟 纯黑色半透明，只降亮度，绝不染色！ */
            z-index: 2;
        }

        /* 3D核心玻璃面板空间 */
        .main-card { perspective: 1000px; z-index: 5; transition: all 0.5s; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px; padding: 45px; width: 380px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            transform-style: preserve-3d; transition: transform 0.1s ease, background 0.3s;
        }
        .avatar {
            width: 80px; height: 80px; background: linear-gradient(135deg, #00f2fe, #7f00ff);
            border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: bold; color: #000; box-shadow: 0 10px 25px rgba(0, 242, 254, 0.3);
            transform: translateZ(30px);
        }
        .brand-name { font-size: 26px; font-weight: 700; margin-bottom: 8px; color: #fff; transform: translateZ(25px); }
        .tagline { color: #00f2fe; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; transform: translateZ(20px); }
        .divider { height: 1px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent); margin-bottom: 25px; }
        .description { color: #a1a1aa; font-size: 14px; line-height: 1.6; margin-bottom: 35px; transform: translateZ(15px); }
        
        .action-btn {
            background: transparent; border: 1px solid rgba(0, 242, 254, 0.4);
            color: #00f2fe; padding: 14px 32px; font-size: 14px; font-weight: 600;
            border-radius: 14px; cursor: pointer; letter-spacing: 2px;
            transition: all 0.3s; transform: translateZ(20px);
        }
        .action-btn:hover {
            background: linear-gradient(135deg, #00f2fe, #7f00ff); color: #000;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.6); border-color: transparent; font-weight: 700;
        }

        .main-card.fade-out { transform: scale(0.9) !important; filter: blur(5px); opacity: 0.1; pointer-events: none; }

        /* 弹窗遮罩层 */
        .portfolio-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 14, 18, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; pointer-events: none;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .portfolio-modal.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px; padding: 40px; width: 90%; max-width: 600px;
            text-align: center; box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            position: relative; transform: scale(0.85); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 90vh; overflow-y: auto;
        }
        .portfolio-modal.active .modal-content { transform: scale(1); }
        .close-btn {
            position: absolute; top: 20px; right: 25px; background: none; border: none; color: #a1a1aa;
            font-size: 24px; cursor: pointer; transition: color 0.3s; z-index: 10;
        }
        .close-btn:hover { color: #ff007f; }
        .modal-content h2 { margin-bottom: 25px; font-size: 24px; letter-spacing: 1px; color: #fff; }

        /* 作品展示网格 */
        .project-grid { display: flex; flex-direction: column; gap: 15px; text-align: left; }
        .project-item {
            background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 18px; display: flex; gap: 15px; align-items: center; transition: all 0.3s;
        }
        .project-item:hover { background: rgba(255,255,255,0.05); border-color: #00f2fe; transform: translateY(-2px); }
        .project-icon { font-size: 32px; }
        .project-item h3 { font-size: 15px; margin-bottom: 4px; color: #fff; }
        .project-item p { font-size: 13px; color: #a1a1aa; line-height: 1.4; }

        /* 联系表单 */
        .contact-section { margin-top: 30px; padding-top: 20px; border-top: 1px dashed rgba(255, 255, 255, 0.1); }
        .form-divider { text-align: center; margin-bottom: 25px; color: #a1a1aa; font-size: 13px; letter-spacing: 2px; }
        #contactForm { display: flex; flex-direction: column; gap: 22px; }
        .input-group { position: relative; width: 100%; margin-top: 15px; }
        .input-group input, .input-group textarea {
            width: 100%; padding: 10px 5px; background: transparent; border: none; color: #fff; font-size: 14px; outline: none; resize: none;
        }
        .input-line { position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background: rgba(255, 255, 255, 0.1); transition: all 0.4s; }
        .input-group label {
            position: absolute; top: 10px; left: 5px; color: #71717a; font-size: 14px; text-align: left; pointer-events: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-group input:focus ~ label, .input-group input:not(:placeholder-shown) ~ label,
        .input-group textarea:focus ~ label, .input-group textarea:not(:placeholder-shown) ~ label { top: -14px; font-size: 11px; color: #00f2fe; letter-spacing: 1px; }
        .input-group input:focus ~ .input-line, .input-group textarea:focus ~ .input-line { background: linear-gradient(to right, #00f2fe, #7f00ff); height: 2px; box-shadow: 0 2px 10px rgba(0, 242, 254, 0.4); }
        .input-group input:invalid:not(:placeholder-shown) ~ .input-line, .input-group textarea:invalid:not(:placeholder-shown) ~ .input-line { background: linear-gradient(to right, #ff0055, #ff5500); box-shadow: 0 2px 10px rgba(255, 0, 85, 0.4); }
        
        .submit-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 254, 0.3); border-radius: 12px;
            color: #00f2fe; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 2px; transition: all 0.3s; margin-top: 10px; width: 100%;
        }
        .submit-btn:hover { background: linear-gradient(135deg, #00f2fe, #7f00ff); color: #000; font-weight: 700; border-color: transparent; box-shadow: 0 0 20px rgba(0, 242, 254, 0.5); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="bg-overlay"></div>

    <main class="main-card">
        <div class="glass-panel">
            <div class="avatar">W</div>
            <h1 class="brand-name">王思源</h1>
            <p class="tagline">AI 视觉架构师 / 独立开发者</p>
            <div class="divider"></div>
            <p class="description">专注于 3D 真实感视觉、AI 漫剧创作与自动化技术落地。手握 ComfyUI 视觉流水线与 Cursor 代码外脑，正在构建未来的数字资产。</p>
            <button class="action-btn">进入作品集</button>
        </div>
    </main>

    <div class="portfolio-modal" id="portfolioModal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn">✕</button>
            <h2>🎨 我的数字资产展示</h2>
            
            <div class="project-grid">
                <div class="project-item">
                    <div class="project-icon">🎬</div>
                    <div>
                        <h3>AI 漫剧视听商业化流水线</h3>
                        <p>打通角色特征锁定与 SVD 时序控流，实现 3D 真实感神话史诗分镜量产。</p>
                    </div>
                </div>
                <div class="project-item">
                    <div class="project-icon">🤖</div>
                    <div>
                        <h3>ComfyUI 自动化电商模特部署</h3>
                        <p>基于多路 ControlNet 权重金字塔，锁死服装包包版型，智能重绘高级面部。</p>
                    </div>
                </div>
            </div>

            <div class="contact-section">
                <div class="form-divider"><span>📬 携手构建未来资产</span></div>
                <form id="contactForm">
                    <div class="input-group">
                        <input type="text" required placeholder=" ">
                        <label>你的称呼 / 厂牌</label>
                        <div class="input-line"></div>
                    </div>
                    <div class="input-group">
                        <input type="email" required placeholder=" ">
                        <label>联系方式 (Email格式)</label>
                        <div class="input-line"></div>
                    </div>
                    <div class="input-group">
                        <textarea required placeholder=" " rows="3"></textarea>
                        <label>你想勾兑的合作项目</label>
                        <div class="input-line"></div>
                    </div>
                    <button type="submit" class="submit-btn">发射意向</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.glass-panel');
            const mainCard = document.querySelector('.main-card');
            const openBtn = document.querySelector('.action-btn');
            const closeBtn = document.getElementById('closeBtn');
            const modal = document.getElementById('portfolioModal');

            if (!card) return;

            card.addEventListener('mousemove', (e) => {
                if (modal.classList.contains('active')) return;
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                const rotateX = -(y / (rect.height / 2)) * 15;
                const rotateY = (x / (rect.width / 2)) * 15;
                const glossX = ((e.clientX - rect.left) / rect.width) * 100;
                const glossY = ((e.clientY - rect.top) / rect.height) * 100;
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;
                card.style.background = `radial-gradient(circle at ${glossX}% ${glossY}%, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.03) 80%)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
                card.style.background = 'rgba(255, 255, 255, 0.03)';
            });

            openBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                modal.classList.add('active');
                mainCard.classList.add('fade-out');
            });

            closeBtn.addEventListener('click', () => {
                modal.classList.remove('active');
                mainCard.classList.remove('fade-out');
            });

            const contactForm = document.getElementById('contactForm');
            if (contactForm) {
                contactForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = contactForm.querySelector('input[type="text"]').value;
                    const contact = contactForm.querySelector('input[type="email"]').value;
                    alert(`🛸 【量子通信建立成功】\n━━━━━━━━━━━━━━━━━━\n📡 厂牌/称呼：${name}\n📬 联络信道：${contact}\n\n🚀 信号已全盘通电发射，思源会尽快建立连接！`);
                    contactForm.reset();
                });
            }
        });
    </script>
</body>
</html>
